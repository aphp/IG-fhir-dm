# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy FHIR Implementation Guide to GitHub pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      - name: Install Jekyll
        run: gem install jekyll bundler

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Cache FHIR packages
        uses: actions/cache@v3
        with:
          path: ~/.fhir/packages
          key: fhir-packages-aphp-edsh-0.1.0
          restore-keys: fhir-packages-

      - name: Install FHIR dependencies
        run: |
          PACKAGE_DIR="$HOME/.fhir/packages/aphp.fhir.fr.edsh#dev"
          if [ ! -f "$PACKAGE_DIR/package/package.json" ]; then
            echo "Downloading aphp.fhir.fr.edsh#dev..."
            mkdir -p "$PACKAGE_DIR"
            curl -fsSL https://aphp.github.io/IG-FHIR-EDSH-SOCLE-COMMUN/package.tgz \
              | tar -xz -C "$PACKAGE_DIR"
          else
            echo "aphp.fhir.fr.edsh#dev already in cache, skipping download."
          fi

      - name: Build IG
        run: gradle buildIG
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Copy output to _site
        run: cp -r ./output _site

      - name: Fix permissions
        run: |
          chmod -c -R +rX "_site/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4