services:

  pathling:
    image: ghcr.io/aehrc/pathling:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_JSON={"pathling.import.allowableSources":["s3a://data-fhir/"],"fs.s3a.endpoint":"http://minio:9000","fs.s3a.access.key":"admin","fs.s3a.secret.key":"password123","fs.s3a.path.style.access":"true","fs.s3a.connection.ssl.enabled":"false"}

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    volumes:
      - minio_data:/data

volumes:
  minio_data:
  